name: Deploy React Vite to Hostinger

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
    - name: Get latest code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build project
      run: npm run build
      env:
        VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
        VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

    - name: Deploy via FTP with full debug
      run: |
        sudo apt-get install -y lftp
        
        echo "=== STEP 1: Login and check where we land ==="
        lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_SERVER" <<EOF
        set ssl:verify-certificate no
        set ftp:passive-mode yes
        debug 3
        pwd
        ls
        echo "=== Trying to enter public_html ==="
        cd public_html
        pwd
        ls -la index.html
        echo "=== Now uploading files ==="
        mirror --reverse --delete --verbose ./dist/ .
        echo "=== Upload complete! Verifying ==="
        ls -la index.html
        bye
        EOF
      env:
        FTP_SERVER: ${{ secrets.FTP_SERVER }}
        FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
        FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
