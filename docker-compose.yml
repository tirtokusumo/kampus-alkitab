services:
  frontend:
    build: .
    container_name: kampus-alkitab-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - kampus-alkitab-network
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: kampus-alkitab-backend
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET:-kampusalkitabsecret2026}
    volumes:
      - ./server/kampus_alkitab.db:/app/kampus_alkitab.db
    networks:
      - kampus-alkitab-network
    restart: unless-stopped

networks:
  kampus-alkitab-network:
    driver: bridge
